<div class="login-page">

  <!-- 🔹 HEADER -->
  <header class="app-header text-center text-white mb-4">
    <h1 class="fw-bold display-5">Task Dashboard</h1>

    <p class="opacity-75 mb-1">
      Manage tasks smarter with role-based access
    </p>

    <p class="small opacity-50">
      Admins monitor teams • Employees track their own work • Real-time updates
    </p>
  </header>

  <!-- 🔹 CARD -->
  <div class="auth-card card shadow-lg border-0">

    <div class="card-body p-4">

      <!-- Branding -->
      <div class="text-center mb-4">
        <h4 class="fw-semibold">Welcome 👋</h4>
        <p class="text-muted mb-0">Login or create an account</p>
      </div>

      <!-- 🔹 TABS -->
      <ul class="nav nav-pills nav-justified mb-4">
        <li class="nav-item">
          <button
            class="nav-link"
            [class.active]="activeTab === 'login'"
            (click)="activeTab = 'login'">
            Login
          </button>
        </li>

        <li class="nav-item">
          <button
            class="nav-link"
            [class.active]="activeTab === 'register'"
            (click)="activeTab = 'register'">
            Register
          </button>
        </li>
      </ul>

      <!-- 🔹 LOGIN -->
      <div *ngIf="activeTab === 'login'">

        <div class="mb-3">
          <label class="form-label">Login as an</label>
          <select class="form-control" [(ngModel)]="role">
            <option value="employee">Employee</option>
            <option value="admin">Admin</option>
          </select>
        </div>

        <div class="mb-3">
          <label class="form-label">Username</label>
          <input
            type="text"
            class="form-control"
            placeholder="Enter username"
            [(ngModel)]="username"
          />
        </div>

        <button class="btn btn-primary w-100" (click)="login()">
          Login
        </button>
      </div>

      <!-- 🔹 REGISTER -->
      <div *ngIf="activeTab === 'register'">

        <div class="mb-3">
          <label class="form-label">Full Name</label>
          <input
            type="text"
            class="form-control"
            placeholder="Enter full name"
            [(ngModel)]="name"
          />
        </div>

        <div class="mb-3">
          <label class="form-label">Username</label>
          <input
            type="text"
            class="form-control"
            placeholder="Choose username"
            [(ngModel)]="username"
          />
        </div>

          <div class="mb-3">
            <label class="form-label">Role</label>
            <select class="form-control" [(ngModel)]="role">
              <option value="employee">Employee</option>
              <option value="admin">Admin</option>
            </select>
          </div>

          <div class="mb-3">
            <label class="form-label">Team</label>
            <input
              type="text"
              class="form-control"
              placeholder="Enter or select team"
              [(ngModel)]="teamName"
              (ngModelChange)="teamName = teamName.toLowerCase()"
              list="teamList"
            />

            <datalist id="teamList">
              <option *ngFor="let team of teams" [value]="team.name.toLowerCase()"></option>
            </datalist>
          </div>

        <button class="btn btn-success w-100" (click)="register()">
          Create Account
        </button>
      </div>

    </div>
  </div>
</div>
