<div class="login-page">

  <!-- LEFT CONTENT -->
  <div class="left-content">

    <div class="brand">
      <div class="logo-text">TaskNova</div>
    </div>

    <h4 style="margin-bottom: 20px;">Work Smarter, Together</h4>

    <p class="subtitle">
      Manage tasks with clarity and control<br>
      Role-based access • Team visibility • Real-time updates
    </p>

  </div>

  <!-- RIGHT CARD -->
  <div class="auth-card card border-0">
    <div class="card-body p-4">

      <div class="text-center mb-4">
        <h4 class="fw-semibold">Welcome 👋</h4>
        <p class="text-muted mb-0">Login or create an account</p>
      </div>

      <!-- TABS -->
      <ul class="nav nav-pills nav-justified mb-4">
        <li class="nav-item">
          <button class="nav-link"
                  [class.active]="activeTab === 'login'"
                  (click)="activeTab = 'login'">
            Login
          </button>
        </li>

        <li class="nav-item">
          <button class="nav-link"
                  [class.active]="activeTab === 'register'"
                  (click)="activeTab = 'register'">
            Register
          </button>
        </li>
      </ul>

      <!--LOGIN TAB-->
      <div *ngIf="activeTab === 'login'">

        <div class="mb-3">
          <label class="form-label">Email</label>
          <input type="email"
                 class="form-control"
                 placeholder="Enter email"
                 [(ngModel)]="loginEmail" />
        </div>

        <div class="mb-3">
          <label class="form-label">Password</label>
          <input type="password"
                 class="form-control"
                 placeholder="Enter password"
                 [(ngModel)]="loginPassword" />
        </div>

        <button class="btn btn-primary w-100" (click)="login()">
          Login
        </button>
      </div>

      <!-- REGISTER TAB-->
      <div *ngIf="activeTab === 'register'">

        <div class="mb-3">
          <label class="form-label">Full Name</label>
          <input type="text"
                 class="form-control"
                 placeholder="Enter full name"
                 [(ngModel)]="name" />
        </div>

        <div class="mb-3">
          <label class="form-label">Username</label>
          <input type="text"
                class="form-control"
                placeholder="Choose a username"
                [(ngModel)]="username" />
        </div>

        <div class="mb-3">
          <label class="form-label">Email</label>
          <input type="email"
                 class="form-control"
                 placeholder="Enter email"
                 [(ngModel)]="registerEmail" />
        </div>

        <div class="mb-3">
          <label class="form-label">Password</label>
          <input type="password"
                 class="form-control"
                 placeholder="Create password"
                 [(ngModel)]="registerPassword" />
        </div>

        <!-- TEAM -->
        <div class="mb-3 position-relative">
          <label class="form-label">Team</label>

          <input type="text"
                 class="form-control"
                 placeholder="Search team"
                 [(ngModel)]="teamName"
                 (input)="filterTeams()"
                 (focus)="showDropdown = true" />

          <ul *ngIf="showDropdown && filteredTeams.length > 0"
              class="dropdown-menu show w-100">
            <li *ngFor="let team of filteredTeams"
                class="dropdown-item"
                (click)="selectTeam(team)">
              {{ team.name }}
            </li>
          </ul>

          <div *ngIf="showDropdown && filteredTeams.length === 0"
               class="text-muted small mt-1">
            No matching team — will be created
          </div>
        </div>

        <button class="btn btn-success w-100" (click)="register()">
          Create Account
        </button>

      </div>

    </div>
  </div>

</div>
